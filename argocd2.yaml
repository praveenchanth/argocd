apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitter
spec:
  replicas: 13
  selector:
    matchLabels:
      app: devops2
  template:
    metadata:
      labels:
        app: devops2
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: twitter
spec:
  type: ClusterIP
  selector:
    app: devops2
  ports:
  - port: 80
    targetPort: 80
